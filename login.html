<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login — UnFail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border-bright: #2e2e4e;
    --accent: #7c6ef7;
    --text: #e8e8f0;
    --text-dim: #888899;
    --text-muted: #444455;
    --red: #ef4444;
    --mono: 'Space Mono', monospace;
    --sans: 'Sora', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
  }
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    animation: fadeUp 0.4s ease both;
  }
  .logo {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  .error {
    background: #1a0505;
    border: 1px solid #7f1d1d;
    color: var(--red);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">UnFail · Owner Access</div>
  <h1>Đăng nhập</h1>
  <p class="sub">Chỉ chủ sở hữu mới có thể duyệt dữ liệu.</p>
  {% if error %}
  <div class="error">⚠ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Mật khẩu</label>
    <input type="password" name="password" placeholder="••••••••" autofocus required>
    <button type="submit">Vào trang quản lý →</button>
  </form>
</div>
</body>
</html>
